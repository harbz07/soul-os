name: Deploy siddartha

on:
  push:
    branches: [ main ]
    paths:
      - "apps/siddartha/**"
      - ".github/workflows/deploy-siddartha.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config apps/siddartha/wrangler.toml

      - name: Push MINDBRIDGE_ROUTER_URL secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "${{ secrets.MINDBRIDGE_ROUTER_URL }}" | wrangler secret put MINDBRIDGE_ROUTER_URL --config apps/siddartha/wrangler.toml

      - name: Push MINDBRIDGE_API_KEY secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "${{ secrets.MINDBRIDGE_API_KEY }}" | wrangler secret put MINDBRIDGE_API_KEY --config apps/siddartha/wrangler.toml
